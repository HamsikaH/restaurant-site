<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Urban Bites</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1550547660-d9450f859349') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.hero h1 {
  font-size: 50px;
  background: rgba(0,0,0,0.6);
  padding: 20px;
  border-radius: 10px;
}

/* SECTION */
.section {
  padding: 60px 20px;
  text-align: center;
}

/* MENU */
.menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}
.item {
  background: #111;
  margin: 15px;
  padding: 15px;
  width: 260px;
  border-radius: 15px;
  transition: 0.3s;
}
.item img {
  width: 100%;
  border-radius: 10px;
  object-fit: cover;
height: 180px;
}
.item:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ff4d6d55;
}

/* BUTTON */
button {
  padding: 12px 25px;
  background: linear-gradient(45deg,#ff4d6d,#ff914d);
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 25px;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Urban Bites 🍔</h1>
</div>

<div class="section">
  <h2>Our Menu</h2>

  <div class="menu">

    <div class="item">
      <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
      <h3>Burger</h3>
      <p>Juicy grilled burger</p>
    </div>

    <div class="item">
      <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Supreme_pizza.jpg">
      <h3>Pizza</h3>
      <p>Cheesy delight</p>
    </div>

    <div class="item">
      <img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d">
      <h3>Fries</h3>
      <p>Crispy & hot</p>
    </div>

  </div>

  <button onclick="order()">Order on WhatsApp</button>
</div>

<!-- WhatsApp Floating -->
<a class="whatsapp" href="https://wa.me/919912414450" target="_blank">💬</a>

<script>
function order() {
  window.open("https://wa.me/919912414450?text=Hi%20I%20want%20to%20order","_blank");
}
</script>

</body>
</html>
